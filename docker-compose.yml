services:
  noripot:
    build:
      context: .
      dockerfile: Dockerfile
      target: release
    restart: unless-stopped
    working_dir: /usr/src/app

    ports:
      - "4096:4096"
      - "3001:3001"

    volumes:
      - ./noripot/runtime:/usr/src/app/runtime
      - ./noripot/scripts:/usr/src/app/projects/scripts

    environment:
      NODE_ENV: production

    init: true
